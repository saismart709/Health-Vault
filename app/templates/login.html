<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>HealthVault - Secure Access</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .tab-row {
            display: flex;
            gap: 4px;
            margin-bottom: 26px;
            background: var(--surface2);
            border-radius: 10px;
            padding: 4px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-family: var(--font-body);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--muted);
        }

        .tab-btn.active {
            background: var(--accent);
            color: #080e1a;
        }

        .error-msg {
            background: rgba(255, 77, 109, 0.1);
            border: 1px solid rgba(255, 77, 109, 0.2);
            color: var(--danger);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>

<body class="auth-wrap">
    <div class="auth-card">
        <div class="logo">✦ HealthVault</div>
        <div class="page-sub" style="margin-bottom: 24px;">Your secure personal health companion</div>

        <div class="tab-row">
            <button class="tab-btn {% if tab != 'register' %}active{% endif %}" onclick="showTab('login')">Sign
                In</button>
            <button class="tab-btn {% if tab == 'register' %}active{% endif %}" onclick="showTab('register')">Create
                Account</button>
        </div>

        {% if error %}
        <div class="error-msg">⚠️ {{ error }}</div>
        {% endif %}

        <!-- Login Form -->
        <form id="loginForm" action="/login" method="post"
            style="display: {% if tab == 'register' %}none{% else %}block{% endif %};">
            <div class="form-group">
                <label class="page-sub"
                    style="display:block; font-size:10px; font-weight:600; text-transform:uppercase; margin-bottom:5px;">Email
                    Address</label>
                <input class="form-input" type="text" name="username" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label class="page-sub"
                    style="display:block; font-size:10px; font-weight:600; text-transform:uppercase; margin-bottom:5px;">Password</label>
                <input class="form-input" type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; margin-top: 10px;">Sign In
                →</button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" action="/register" method="post"
            style="display: {% if tab == 'register' %}block{% else %}none{% endif %};">
            <div class="form-group">
                <label class="page-sub"
                    style="display:block; font-size:10px; font-weight:600; text-transform:uppercase; margin-bottom:5px;">Full
                    Name</label>
                <input class="form-input" type="text" name="full_name" placeholder="John Doe" required>
            </div>
            <div class="two-col">
                <div class="form-group">
                    <label class="page-sub"
                        style="display:block; font-size:10px; font-weight:600; text-transform:uppercase; margin-bottom:5px;">Age</label>
                    <input class="form-input" type="number" name="age" placeholder="30" required>
                </div>
                <div class="form-group">
                    <label class="page-sub"
                        style="display:block; font-size:10px; font-weight:600; text-transform:uppercase; margin-bottom:5px;">Blood
                        Group</label>
                    <select class="form-input" name="blood_group">
                        <option>O+</option>
                        <option>O-</option>
                        <option>A+</option>
                        <option>A-</option>
                        <option>B+</option>
                        <option>B-</option>
                        <option>AB+</option>
                        <option>AB-</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label class="page-sub"
                    style="display:block; font-size:10px; font-weight:600; text-transform:uppercase; margin-bottom:5px;">Email
                    / Username</label>
                <input class="form-input" type="text" name="username" placeholder="you@email.com" required>
            </div>
            <div class="form-group">
                <label class="page-sub"
                    style="display:block; font-size:10px; font-weight:600; text-transform:uppercase; margin-bottom:5px;">Create
                    Password</label>
                <input class="form-input" type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px; margin-top: 10px;">Register
                Account →</button>
        </form>

        <div
            style="text-align: center; margin-top: 24px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 20px;">
            Securely encrypted medical database
        </div>
    </div>

    <script>
        function showTab(tab) {
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';

            const buttons = document.querySelectorAll('.tab-btn');
            buttons[0].classList.toggle('active', tab === 'login');
            buttons[1].classList.toggle('active', tab === 'register');
        }
    </script>
</body>

</html>
